<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="給 3 歲半幼兒的兔兔互動學習網站：ABC、寶寶物理、寶寶量子與寶寶科學。">
  <meta name="theme-color" content="#fff4e8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="preload" as="image" href="bunny_garden_3d_v1.webp" type="image/webp" fetchpriority="high">
  <title>兔兔小小科學院</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #24324a;
      --muted: #65748c;
      --paper: #fffdf8;
      --panel: #ffffff;
      --mint: #bcebdc;
      --sky: #b8d7ff;
      --sun: #ffe49b;
      --berry: #f68aa2;
      --leaf: #6fc48a;
      --violet: #9d8be9;
      --line: #d9e2ef;
      --shadow: 0 14px 34px rgba(43, 60, 87, 0.14);
      --radius: 8px;
      font-family: "Inter", "Nunito", "PingFang TC", "Microsoft JhengHei", system-ui, sans-serif;
      letter-spacing: 0;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(180deg, rgba(184, 215, 255, 0.72), rgba(255, 253, 248, 0.98) 34%),
        repeating-linear-gradient(90deg, rgba(188, 235, 220, 0.25), rgba(188, 235, 220, 0.25) 18px, transparent 18px, transparent 36px);
      color: var(--ink);
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .app > main {
      flex: 1;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 18px 22px 12px;
      border-bottom: 1px solid rgba(217, 226, 239, 0.75);
      background: rgba(255, 253, 248, 0.82);
      backdrop-filter: blur(16px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .bunny-mark {
      width: 70px;
      height: 70px;
      flex: 0 0 auto;
      filter: drop-shadow(0 8px 14px rgba(36, 50, 74, 0.16));
    }

    .bunny-mark .bunny-float,
    .mini-bunny .bunny-float {
      animation: bunnyFloat 2700ms ease-in-out infinite;
      transform-box: fill-box;
      transform-origin: center;
    }

    .bunny-mark .bunny-ears,
    .mini-bunny .bunny-ears {
      animation: bunnyEarWiggle 3200ms ease-in-out infinite;
      transform-box: fill-box;
      transform-origin: center bottom;
    }

    .sparkle-dot {
      animation: sparklePulse 1800ms ease-in-out infinite;
      transform-box: fill-box;
      transform-origin: center;
    }

    .title-block {
      min-width: 0;
    }

    h1 {
      margin: 0;
      font-size: 30px;
      line-height: 1.05;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.45;
    }

    .status-strip {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      flex-wrap: wrap;
    }

    .pill {
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--ink);
      font-weight: 800;
      box-shadow: 0 6px 16px rgba(43, 60, 87, 0.08);
      white-space: nowrap;
    }

    .mode-row {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      padding: 14px 22px;
      background: rgba(255, 255, 255, 0.72);
      border-bottom: 1px solid rgba(217, 226, 239, 0.75);
    }

    .mode-button {
      min-height: 58px;
      border-radius: var(--radius);
      border: 2px solid transparent;
      background: #ffffff;
      color: var(--ink);
      font-size: 17px;
      font-weight: 900;
      box-shadow: 0 8px 18px rgba(43, 60, 87, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .mode-button[aria-pressed="true"] {
      border-color: #24324a;
      background: var(--sun);
      transform: translateY(-1px);
    }

    main {
      width: min(1180px, 100%);
      margin: 0 auto;
      padding: 22px;
    }

    .dashboard {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      gap: 18px;
      align-items: start;
    }

    .stage {
      min-height: 600px;
      border-radius: var(--radius);
      border: 1px solid rgba(217, 226, 239, 0.9);
      background: rgba(255, 255, 255, 0.94);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .stage-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(90deg, rgba(188, 235, 220, 0.86), rgba(184, 215, 255, 0.72));
    }

    .stage-title {
      margin: 0;
      font-size: 22px;
      line-height: 1.2;
    }

    .stage-note {
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }

    .stage-body {
      padding: 20px;
    }

    .learn-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      align-items: stretch;
    }

    .letter-panel {
      min-height: 420px;
      border-radius: var(--radius);
      border: 2px solid #24324a;
      background:
        linear-gradient(180deg, #fffdf8, #f3fbff),
        radial-gradient(circle at top left, rgba(255, 228, 155, 0.45), transparent 36%);
      display: grid;
      place-items: center;
      padding: 24px;
      position: relative;
      overflow: hidden;
    }

    .letter-stack {
      text-align: center;
      display: grid;
      justify-items: center;
      gap: 12px;
      z-index: 1;
    }

    .big-letter {
      font-size: 160px;
      line-height: 0.9;
      font-weight: 1000;
      color: #24324a;
      text-shadow: 0 8px 0 rgba(246, 138, 162, 0.24);
    }

    .small-letter {
      font-size: 52px;
      line-height: 1;
      font-weight: 1000;
      color: #65748c;
    }

    .word-chip {
      min-width: 170px;
      min-height: 58px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      border-radius: var(--radius);
      background: var(--sun);
      border: 2px solid #24324a;
      font-size: 25px;
      font-weight: 900;
      padding: 8px 14px;
    }

    .object-panel {
      min-height: 420px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: #ffffff;
      display: grid;
      grid-template-rows: 1fr auto;
      gap: 14px;
      padding: 20px;
    }

    .object-scene {
      min-height: 260px;
      display: grid;
      place-items: center;
      border-radius: var(--radius);
      background:
        linear-gradient(180deg, rgba(184, 215, 255, 0.42), rgba(188, 235, 220, 0.34)),
        linear-gradient(0deg, rgba(111, 196, 138, 0.12), rgba(255, 255, 255, 0));
      border: 1px dashed #9eb4ce;
      position: relative;
      overflow: hidden;
    }

    .object-emoji {
      font-size: 104px;
      line-height: 1;
      filter: drop-shadow(0 12px 10px rgba(36, 50, 74, 0.16));
    }

    .mini-bunny {
      position: absolute;
      left: 20px;
      bottom: 18px;
      width: 104px;
      height: 104px;
      filter: drop-shadow(0 10px 12px rgba(36, 50, 74, 0.18));
    }

    .action-row {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .big-action,
    .icon-action {
      min-height: 64px;
      border-radius: var(--radius);
      border: 2px solid #24324a;
      background: #ffffff;
      color: var(--ink);
      font-size: 24px;
      font-weight: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 7px 0 rgba(36, 50, 74, 0.15);
    }

    .big-action.primary {
      background: var(--leaf);
      color: #10271a;
    }

    .icon-action {
      aspect-ratio: 1 / 1;
      min-width: 64px;
    }

    .match-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .memory-card {
      aspect-ratio: 1 / 1;
      min-height: 150px;
      border-radius: var(--radius);
      border: 2px solid #24324a;
      background: var(--sky);
      color: var(--ink);
      font-size: 72px;
      font-weight: 1000;
      box-shadow: 0 8px 0 rgba(36, 50, 74, 0.14);
      display: grid;
      place-items: center;
      position: relative;
      transition: transform 140ms ease, background 140ms ease;
    }

    .memory-card::before {
      content: "";
      width: 76px;
      height: 62px;
      background:
        radial-gradient(circle at 30% 30%, #ffffff 0 18px, transparent 19px),
        radial-gradient(circle at 70% 30%, #ffffff 0 18px, transparent 19px),
        radial-gradient(circle at 50% 62%, #ffffff 0 30px, transparent 31px);
      opacity: 0.95;
      display: block;
    }

    .memory-card.revealed::before,
    .memory-card.matched::before {
      display: none;
    }

    .memory-card.revealed {
      background: var(--sun);
      transform: translateY(-2px);
    }

    .memory-card.matched {
      background: var(--mint);
      border-color: #2f8d5d;
    }

    .listen-layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 20px;
      align-items: stretch;
    }

    .listen-pad {
      border-radius: var(--radius);
      border: 2px solid #24324a;
      background: #ffffff;
      display: grid;
      place-items: center;
      gap: 12px;
      padding: 18px;
      text-align: center;
    }

    .speaker-button {
      width: 174px;
      height: 174px;
      border-radius: 50%;
      background: var(--berry);
      color: #ffffff;
      border: 4px solid #24324a;
      font-size: 78px;
      box-shadow: 0 12px 0 rgba(36, 50, 74, 0.2);
    }

    .listen-options {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .choice-button {
      min-height: 150px;
      border-radius: var(--radius);
      border: 2px solid #24324a;
      background: var(--panel);
      color: var(--ink);
      font-size: 82px;
      line-height: 1;
      font-weight: 1000;
      box-shadow: 0 8px 0 rgba(36, 50, 74, 0.14);
    }

    .choice-button.correct {
      background: var(--mint);
      border-color: #2f8d5d;
    }

    .choice-button.wrong {
      background: #ffd3d3;
      border-color: #c94c4c;
    }

    .side-panel {
      display: grid;
      gap: 14px;
    }

    .progress-panel,
    .focus-panel,
    .parent-panel {
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.94);
      box-shadow: 0 10px 22px rgba(43, 60, 87, 0.1);
      padding: 15px;
    }

    .panel-title {
      margin: 0 0 12px;
      font-size: 18px;
      line-height: 1.2;
    }

    .focus-letters {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .focus-letter {
      min-height: 54px;
      border-radius: var(--radius);
      border: 2px solid #24324a;
      display: grid;
      place-items: center;
      font-size: 30px;
      font-weight: 1000;
      background: var(--sun);
    }

    .meter-list {
      display: grid;
      gap: 8px;
      max-height: 260px;
      overflow: auto;
      padding-right: 3px;
    }

    .meter-item {
      display: grid;
      grid-template-columns: 34px 1fr 42px;
      gap: 8px;
      align-items: center;
      font-size: 13px;
      font-weight: 900;
    }

    .meter-track {
      height: 12px;
      border-radius: 999px;
      background: #e8edf5;
      overflow: hidden;
    }

    .meter-fill {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, var(--leaf), var(--sky));
    }

    .parent-actions {
      display: grid;
      gap: 8px;
    }

    .quiet-button {
      min-height: 44px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: #ffffff;
      color: var(--ink);
      font-size: 14px;
      font-weight: 900;
      text-align: center;
      padding: 8px;
    }

    .feedback {
      min-height: 52px;
      margin-top: 16px;
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: #f4f8ff;
      border: 1px solid var(--line);
      color: var(--ink);
      font-size: 18px;
      font-weight: 900;
    }

    .reward-sky {
      pointer-events: none;
      position: fixed;
      inset: 0;
      overflow: hidden;
      z-index: 20;
    }

    .star-pop {
      position: absolute;
      font-size: 34px;
      animation: floatUp 900ms ease-out forwards;
    }

    footer {
      padding: 10px 22px 18px;
      color: var(--muted);
      font-size: 12px;
      text-align: center;
    }

    [hidden] {
      display: none !important;
    }

    @keyframes floatUp {
      from {
        opacity: 0;
        transform: translateY(18px) scale(0.78);
      }
      20% {
        opacity: 1;
      }
      to {
        opacity: 0;
        transform: translateY(-82px) scale(1.18);
      }
    }

    @keyframes bunnyFloat {
      0%,
      100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-4px);
      }
    }

    @keyframes bunnyEarWiggle {
      0%,
      100% {
        transform: rotate(0deg);
      }
      46% {
        transform: rotate(-3deg);
      }
      56% {
        transform: rotate(2deg);
      }
    }

    @keyframes sparklePulse {
      0%,
      100% {
        opacity: 0.55;
        transform: scale(0.86);
      }
      50% {
        opacity: 1;
        transform: scale(1.08);
      }
    }

    @media (max-width: 900px) {
      .dashboard {
        grid-template-columns: 1fr;
      }

      .side-panel {
        grid-template-columns: 1fr 1fr;
      }

      .parent-panel {
        grid-column: 1 / -1;
      }
    }

    @media (max-width: 720px) {
      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .status-strip {
        justify-content: flex-start;
      }

      .mode-row {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        padding: 12px;
      }

      main {
        padding: 12px;
      }

      .learn-layout,
      .listen-layout {
        grid-template-columns: 1fr;
      }

      .letter-panel,
      .object-panel {
        min-height: 310px;
      }

      .big-letter {
        font-size: 112px;
      }

      .small-letter {
        font-size: 42px;
      }

      .action-row {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .match-grid {
        gap: 10px;
      }

      .memory-card {
        min-height: 108px;
        font-size: 54px;
      }

      .choice-button {
        min-height: 112px;
        font-size: 62px;
      }

      .side-panel {
        grid-template-columns: 1fr;
      }
    }

    /* Premium 3D storybook visual pass */
    :root {
      --ink: #3f3555;
      --muted: #746985;
      --paper: #fffaf3;
      --panel: #ffffff;
      --mint: #aee7ce;
      --sky: #b9ddff;
      --sun: #ffe58f;
      --berry: #f586a6;
      --leaf: #79cb94;
      --violet: #8e7ad9;
      --line: #e7dfee;
      --shadow: 0 18px 44px rgba(73, 54, 92, 0.16);
    }

    body {
      background: linear-gradient(180deg, #fff4e8 0%, #f3faff 48%, #fffdf8 100%);
    }

    .topbar {
      padding: 16px 24px 14px;
      background: rgba(255, 252, 247, 0.88);
      border-bottom-color: rgba(231, 223, 238, 0.86);
      box-shadow: 0 8px 28px rgba(105, 82, 115, 0.08);
    }

    .bunny-mark {
      width: 72px;
      height: 72px;
      border: 4px solid #ffffff;
      border-radius: 50%;
      background-image: url("bunny_garden_3d_v1.webp");
      background-position: 78% 39%;
      background-size: 270% auto;
      background-repeat: no-repeat;
      box-shadow: 0 9px 20px rgba(86, 66, 102, 0.2), inset 0 0 0 1px rgba(255, 255, 255, 0.8);
      filter: none;
    }

    .bunny-mark > * {
      opacity: 0;
    }

    h1 {
      color: #403456;
      font-size: 30px;
      text-shadow: 0 2px 0 #ffffff;
    }

    .subtitle {
      color: #7c6b86;
      font-weight: 700;
    }

    .pill {
      border-color: rgba(226, 210, 233, 0.95);
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 7px 18px rgba(80, 59, 93, 0.1), inset 0 2px 0 #ffffff;
    }

    .mode-row {
      padding: 12px 24px 14px;
      background: rgba(255, 255, 255, 0.68);
      border-bottom-color: rgba(231, 223, 238, 0.8);
    }

    .mode-button {
      min-height: 56px;
      border: 1px solid rgba(225, 215, 235, 0.92);
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 8px 18px rgba(83, 65, 96, 0.1), inset 0 2px 0 #ffffff;
      transition: transform 150ms ease, box-shadow 150ms ease, background 150ms ease;
    }

    .mode-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 11px 22px rgba(83, 65, 96, 0.14), inset 0 2px 0 #ffffff;
    }

    .mode-button[aria-pressed="true"] {
      border-color: #f0bf5e;
      background: linear-gradient(180deg, #fff4b9, #ffdd73);
      box-shadow: 0 8px 0 #e8b85b, 0 14px 24px rgba(161, 112, 46, 0.14), inset 0 2px 0 rgba(255, 255, 255, 0.85);
      transform: translateY(-3px);
    }

    main {
      width: min(1240px, 100%);
      padding: 22px 24px 28px;
    }

    .dashboard {
      grid-template-columns: minmax(0, 1fr) 292px;
      gap: 20px;
    }

    .stage {
      min-height: 640px;
      border: 1px solid rgba(231, 223, 238, 0.9);
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 24px 56px rgba(82, 61, 94, 0.17);
    }

    .stage-header {
      padding: 15px 18px;
      border-bottom-color: rgba(229, 215, 235, 0.84);
      background: linear-gradient(90deg, #c8f0df 0%, #d6e9ff 55%, #ffe8b8 100%);
    }

    .stage-title {
      color: #493b5c;
      font-size: 23px;
    }

    .stage-body {
      padding: 18px;
    }

    .learn-layout {
      display: block;
    }

    .storybook-card {
      display: grid;
      gap: 14px;
    }

    .storybook-scene {
      position: relative;
      min-height: 500px;
      aspect-ratio: 3 / 2;
      overflow: hidden;
      isolation: isolate;
      border: 4px solid #ffffff;
      border-radius: var(--radius);
      background: #dff2ff;
      box-shadow: 0 18px 40px rgba(83, 62, 90, 0.18), inset 0 0 0 1px rgba(99, 80, 99, 0.08);
    }

    .storybook-scene::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -1;
      background: linear-gradient(90deg, rgba(255, 250, 239, 0.3), transparent 52%);
      pointer-events: none;
    }

    .storybook-scene::after {
      content: "";
      position: absolute;
      inset: -2%;
      z-index: -2;
      background-image: url("bunny_garden_3d_v1.webp");
      background-position: center;
      background-size: cover;
      background-repeat: no-repeat;
      transform: scale(1.02);
      animation: sceneDrift 10s ease-in-out infinite alternate;
      pointer-events: none;
    }

    .storybook-scene.is-speaking .object-scene {
      animation: objectSpeak 560ms cubic-bezier(0.2, 0.85, 0.25, 1.25);
    }

    .storybook-scene.is-celebrating .object-scene {
      animation: objectCelebrate 680ms cubic-bezier(0.18, 0.9, 0.25, 1.25);
    }

    .storybook-scene.is-celebrating::before {
      background: linear-gradient(90deg, rgba(255, 250, 239, 0.42), rgba(255, 240, 150, 0.18), transparent 72%);
    }

    .storybook-scene .letter-panel {
      position: absolute;
      top: 6.5%;
      left: 5%;
      width: 38%;
      min-height: 77%;
      padding: 20px 14px;
      border: 3px solid rgba(255, 255, 255, 0.96);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.82);
      box-shadow: 0 22px 48px rgba(78, 60, 87, 0.2), inset 0 0 30px rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(13px) saturate(1.14);
      -webkit-backdrop-filter: blur(13px) saturate(1.14);
    }

    .letter-stack {
      gap: 8px;
      width: 100%;
    }

    .big-letter {
      font-size: 172px;
      line-height: 0.82;
      color: #6250a7;
      text-shadow:
        0 4px 0 #ffffff,
        0 10px 0 #f6a3b8,
        0 17px 24px rgba(88, 62, 106, 0.25);
      transform: translateZ(0);
      transition: transform 180ms ease;
    }

    .big-letter:hover {
      transform: translateY(-4px) rotate(-2deg) scale(1.03);
    }

      border-radius: 5px 5px 17px 17px;
      background: rgba(255, 255, 255, 0.52);
    }

    .mix-cup::after {
      content: "";
      position: absolute;
      inset: 34px 3px 3px;
      border-radius: 3px 3px 11px 11px;
      background: var(--liquid, #ef5a51);
    }

    .mix-plus {
      align-self: center;
      color: #756680;
      font-size: 28px;
      font-weight: 950;
    }

    .mix-result::after {
      background: #f2a640;
      transform: scaleY(0);
      transform-origin: bottom;
    }

    .is-running .mix-result::after {
      animation: fillCup .95s ease-out both;
    }

    .horseshoe {
      position: absolute;
      left: 8%;
      top: 23px;
      width: 100px;
      height: 100px;
      border: 24px solid #ef5548;
      border-bottom-color: transparent;
      border-radius: 55px 55px 24px 24px;
      box-shadow: inset 0 0 0 3px rgba(255, 255, 255, 0.35), 0 9px 15px rgba(90, 45, 42, 0.18);
      transform: rotate(-90deg);
    }

    .metal-star {
      --star-x: -110px;
      position: absolute;
      right: 9%;
      top: var(--star-y, 25px);
      color: #a8b3bd;
      font-size: 34px;
      filter: drop-shadow(0 4px 3px rgba(42, 49, 57, 0.2));
    }

    .metal-star:nth-child(3) { --star-y: 75px; --star-x: -82px; }
    .metal-star:nth-child(4) { --star-y: 44px; --star-x: -55px; }

    .is-running .metal-star {
      animation: magnetPull .85s ease-in both;
    }

    .plant-pot {
      position: absolute;
      left: 42%;
      bottom: 4px;
      width: 86px;
      height: 54px;
      border-radius: 8px 8px 28px 28px;
      background: linear-gradient(180deg, #ed9d67, #bd653d);
      box-shadow: 0 8px 12px rgba(91, 53, 38, 0.17);
    }

    .plant-stem {
      position: absolute;
      left: calc(50% - 5px);
      bottom: 50px;
      width: 10px;
      height: 38px;
      border-radius: 8px;
      background: #54a766;
      transform: scaleY(.18) rotate(0deg);
      transform-origin: bottom;
    }

    .plant-leaf {
      position: absolute;
      left: 47%;
      bottom: 82px;
      width: 42px;
      height: 25px;
      border-radius: 100% 10% 100% 10%;
      background: linear-gradient(145deg, #80cb6f, #3e9253);
      opacity: 0;
      transform: rotate(-18deg) scale(.3);
    }

    .plant-leaf.second {
      left: 38%;
      bottom: 68px;
      transform: rotate(198deg) scale(.3);
    }

    .sun-toy {
      position: absolute;
      right: 8%;
      top: 8px;
      width: 62px;
      height: 62px;
      border-radius: 50%;
      background: radial-gradient(circle, #fffbd2 0 20%, #ffe16a 24%, #f8b937 76%);
      box-shadow: 0 0 24px rgba(255, 202, 56, .62);
    }

    .is-running .plant-stem {
      animation: sproutGrow 1.2s ease-out both;
    }

    .is-running .plant-leaf {
      animation: leafGrow .8s .55s ease-out both;
    }

    .is-running .plant-leaf.second {
      animation: leafGrowSecond .8s .72s ease-out both;
    }

    @keyframes ballRoll {
      0% { transform: translate(0, 0) rotate(0deg); }
      72% { transform: translate(205px, 55px) rotate(560deg); }
      100% { transform: translate(235px, 55px) rotate(650deg); }
    }

    @keyframes balloonRise {
      to { transform: translateY(-115px) rotate(5deg); }
    }

    @keyframes stoneDrop {
      0% { transform: translateY(0) rotate(0deg); }
      82% { transform: translateY(92px) rotate(18deg); }
      100% { transform: translateY(86px) rotate(14deg); }
    }

    @keyframes boatBob {
      0%, 100% { transform: translateY(0) rotate(-2deg); }
      50% { transform: translateY(7px) rotate(3deg); }
    }

    @keyframes pebbleSink {
      to { transform: translateY(96px) rotate(24deg); }
    }

    @keyframes photonTravel {
      0% { opacity: 0; transform: translateX(0) scale(.5); }
      18% { opacity: 1; }
      82% { opacity: 1; }
      100% { opacity: 0; transform: translateX(220px) scale(1.12); }
    }

    @keyframes beamGrow {
      from { opacity: 0; transform: scaleX(.05); transform-origin: left; }
      to { opacity: 1; transform: scaleX(1); transform-origin: left; }
    }

    @keyframes stripesAppear {
      from { opacity: .25; transform: scale(.93); }
      to { opacity: 1; transform: scale(1); }
    }

    @keyframes fillCup {
      to { transform: scaleY(1); }
    }

    @keyframes magnetPull {
      to { transform: translateX(var(--star-x)) rotate(270deg) scale(.9); }
    }

    @keyframes sproutGrow {
      0% { transform: scaleY(.18) rotate(0deg); }
      70% { transform: scaleY(1) rotate(4deg); }
      100% { transform: scaleY(1) rotate(9deg); }
    }

    @keyframes leafGrow {
      to { opacity: 1; transform: rotate(-18deg) scale(1); }
    }

    @keyframes leafGrowSecond {
      to { opacity: 1; transform: rotate(198deg) scale(1); }
    }

    @keyframes objectBob {
      0%,
      100% {
        transform: translateY(0) rotate(-2deg);
      }
      50% {
        transform: translateY(-9px) rotate(2deg);
      }
    }

    @keyframes sceneDrift {
      0% {
        transform: scale(1.02) translate3d(-0.25%, 0, 0);
      }
      100% {
        transform: scale(1.045) translate3d(0.35%, -0.35%, 0);
      }
    }

    @keyframes objectSpeak {
      0%,
      100% {
        transform: translateY(0) scale(1);
      }
      45% {
        transform: translateY(-13px) scale(1.1) rotate(5deg);
      }
    }

    @keyframes objectCelebrate {
      0% {
        transform: translateY(0) scale(1) rotate(0deg);
      }
      42% {
        transform: translateY(-24px) scale(1.15) rotate(-8deg);
      }
      72% {
        transform: translateY(-7px) scale(0.96) rotate(5deg);
      }
      100% {
        transform: translateY(0) scale(1) rotate(0deg);
      }
    }

    @keyframes letterPop {
      0% {
        transform: scale(0.82) rotate(-4deg);
      }
      68% {
        transform: scale(1.06) rotate(2deg);
      }
      100% {
        transform: scale(1) rotate(0deg);
      }
    }

    @media (max-width: 1040px) {

      main {

      .stage-body {

      .storybook-scene {

    @media (prefers-reduced-motion: reduce) {

  <script>
    const STORE_KEY = "bunnyAlphabetMemoryV1";
    const TODAY_KEY = new Date().toISOString().slice(0, 10);

    const LETTERS = [
      { upper: "A", lower: "a", word: "Apple", icon: "🍎" },
      { upper: "B", lower: "b", word: "Balloon", icon: "🎈" },
      { upper: "C", lower: "c", word: "Cake", icon: "🍰" },

    function loadState() {
      const blankStats = Object.fromEntries(LETTERS.map((letter) => [
        letter.upper,
        { seen: 0, heard: 0, matched: 0, correct: 0, attempts: 0, last: "" }
      ]));

      try {
        const parsed = JSON.parse(localStorage.getItem(STORE_KEY) || "{}");
        return {
          stars: Number(parsed.stars || 0),
          days: parsed.days || {},
          soundStyle: parsed.soundStyle === "chimeOnly" ? "chimeOnly" : "softVoice",
          discoveryCompleted: parsed.discoveryCompleted || {},
          stats: { ...blankStats, ...(parsed.stats || {}) }
        };
      } catch {
        return { stars: 0, days: {}, soundStyle: "softVoice", discoveryCompleted: {}, stats: blankStats };
      }
    }

    function saveState() {
      localStorage.setItem(STORE_KEY, JSON.stringify(state));
    }

    function unlockedCount() {
      const totalCorrect = Object.values(state.stats).reduce((sum, item) => sum + item.correct + item.matched, 0);
      return Math.min(26, Math.max(4, 4 + Math.floor(totalCorrect / 5)));
    }

    function mastery(letter) {
      const item = state.stats[letter.upper] || {};
      const points = (item.seen || 0) + (item.heard || 0) + (item.correct || 0) * 2 + (item.matched || 0) * 2;
      return Math.min(5, Math.floor(points / 3));
    }

    function getFocusLetters() {
      const pool = LETTERS.slice(0, unlockedCount());
      return [...pool]
        .sort((a, b) => mastery(a) - mastery(b) || (state.stats[a.upper].last || "").localeCompare(state.stats[b.upper].last || ""))
        .slice(0, 4);
    }

    function getWeakLetters() {
      return [...LETTERS.slice(0, unlockedCount())]
        .sort((a, b) => mastery(a) - mastery(b))
        .slice(0, 4);
    }

    function touch(letter, field, star = false) {
      const stat = state.stats[letter.upper];
      stat[field] += 1;
      stat.last = TODAY_KEY;
      state.days[TODAY_KEY] = (state.days[TODAY_KEY] || 0) + 1;
      if (star) {
        state.stars += 1;
        popStars();
      }
      saveState();
      focusLetters = getFocusLetters();
      refreshAll();
    }

    function renderDiscoveryLesson() {

      const subject = DISCOVERY[subjectKey];

      els.discoveryFeedback.textContent = "先猜猜看，再按下按鈕做實驗。";
      els.parentScienceNote.textContent = lesson.parent;

      els.lessonTabs.innerHTML = "";

        button.type = "button";

    function completeDiscoveryLesson(lesson) {
      const key = `${activeWorld}:${lesson.id}`;

    function completedDiscoveryCount() {
      return Object.keys(state.discoveryCompleted || {}).filter((key) => /^(physics|quantum|science):/.test(key)).length;
    }

    function sayDiscoveryText(text) {
      if (state.soundStyle === "chimeOnly") {
        playDiscoveryChime();
        return;
      }

      if (!("speechSynthesis" in window)) {
        playDiscoveryChime();
        return;
      }

      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = "zh-TW";
      utterance.rate = 0.84;
      utterance.pitch = 1;
      utterance.volume = 0.9;
      friendlyChineseVoice = friendlyChineseVoice || pickFriendlyChineseVoice();
      if (friendlyChineseVoice) {
        utterance.voice = friendlyChineseVoice;
      }
      window.speechSynthesis.speak(utterance);
    }

    function pickFriendlyChineseVoice() {
      if (!("speechSynthesis" in window)) return null;
      const voices = window.speechSynthesis.getVoices();
      const chineseVoices = voices.filter((voice) => /^zh[-_]/i.test(voice.lang));
      const preferredNames = [
        /ting.ting/i,
        /mei.jia/i,
        /sin.ji/i,
        /mandarin.*taiwan/i,
        /taiwan/i,
        /google.*中文/i
      ];
      const preferredVoice = preferredNames
        .map((pattern) => chineseVoices.find((voice) => pattern.test(voice.name)))
        .find(Boolean);
      const premiumVoice = chineseVoices.find((voice) => /enhanced|premium|neural|natural/i.test(voice.name));
      return preferredVoice || premiumVoice || chineseVoices.find((voice) => voice.localService) || chineseVoices[0] || null;
    }

    function playDiscoveryChime() {

      els.learnWord.textContent = letter.word;
      els.objectEmoji.textContent = letter.icon;
      els.learnCard.setAttribute("aria-label", `唸出 ${letter.upper}, ${letter.word}`);
      animateLearnCard();
      touchSeenOnce(letter);
    }

    function animateLearnCard() {
      els.learnCard.classList.remove("letter-pop");
      void els.learnCard.offsetWidth;
      els.learnCard.classList.add("letter-pop");
    }

    function touchSeenOnce(letter) {
      const stat = state.stats[letter.upper];
      if (stat.last !== TODAY_KEY || stat.seen === 0) {
        stat.seen += 1;
        stat.last = TODAY_KEY;
        saveState();
      }
    }

    function moveLearn(direction, options = {}) {
      learnIndex = (learnIndex + direction + focusLetters.length) % focusLetters.length;
      renderLearnLetter();
      if (!options.keepFeedback) {
        els.learnFeedback.textContent = `${focusLetters[learnIndex].upper} ${focusLetters[learnIndex].word}`;
      }
      refreshAll();
    }

    function sayCurrentLetter() {
      const letter = focusLetters[learnIndex % focusLetters.length];
      pulseScene("is-speaking", 620);
      sayLetter(letter);
      els.learnFeedback.textContent = `兔兔唸：${letter.upper}, ${letter.word}`;
    }

    function markKnown() {
      const letter = focusLetters[learnIndex % focusLetters.length];
      pulseScene("is-celebrating", 760);
      touch(letter, "correct", true);
      els.learnFeedback.textContent = `收下 ${letter.upper} 的星星`;
      moveLearn(1, { keepFeedback: true });
    }

    function pulseScene(className, duration) {
      els.storybookScene.classList.remove(className);
      void els.storybookScene.offsetWidth;
      els.storybookScene.classList.add(className);
      window.setTimeout(() => els.storybookScene.classList.remove(className), duration);
    }

    function buildMatchBoard() {
      firstPick = null;
      lockCards = false;
      els.matchGrid.innerHTML = "";

      const cards = shuffle(focusLetters.slice(0, 3).flatMap((letter) => [
        { letter, value: letter.upper, pair: letter.upper },
        { letter, value: letter.lower, pair: letter.upper }
      ]));

      cards.forEach((card, index) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "memory-card";
        button.dataset.pair = card.pair;
        button.dataset.index = String(index);
        button.dataset.value = card.value;
        button.setAttribute("aria-label", "翻開卡片");
        button.addEventListener("click", () => flipCard(button, card.letter));
        els.matchGrid.appendChild(button);
      });

      els.matchFeedback.textContent = "翻兩張，找一樣的大小寫字母。";
    }

    function flipCard(button, letter) {
      if (lockCards || button.classList.contains("matched") || button.classList.contains("revealed")) return;

      button.textContent = button.dataset.value;
      button.classList.add("revealed");
      button.setAttribute("aria-label", `字母 ${button.dataset.value}`);

      if (!firstPick) {
        firstPick = { button, letter };
        return;
      }

      const isMatch = firstPick.button.dataset.pair === button.dataset.pair;
      if (isMatch) {
        firstPick.button.classList.add("matched");
        button.classList.add("matched");
        firstPick.button.classList.remove("revealed");
        button.classList.remove("revealed");
        touch(letter, "matched", true);
        els.matchFeedback.textContent = `${letter.upper} 和 ${letter.lower} 配對成功`;
        firstPick = null;

        if (document.querySelectorAll(".memory-card.matched").length === 6) {
          els.matchFeedback.textContent = "這一組完成了，兔兔再換一組。";
          setTimeout(buildMatchBoard, 900);
        }
        return;
      }

      lockCards = true;
      els.matchFeedback.textContent = "再找一次";
      setTimeout(() => {
        firstPick.button.textContent = "";
        button.textContent = "";
        firstPick.button.classList.remove("revealed");
        button.classList.remove("revealed");
        firstPick = null;
        lockCards = false;
      }, 720);
    }

    function buildListenRound() {
      const options = shuffle([...focusLetters]).slice(0, 4);
      listenTarget = options[Math.floor(Math.random() * options.length)];
      lastIncorrectChoice = "";
      els.listenOptions.innerHTML = "";

      options.forEach((letter) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "choice-button";
        button.textContent = letter.upper;
        button.setAttribute("aria-label", `選 ${letter.upper}`);
        button.addEventListener("click", () => chooseListen(letter, button));
        els.listenOptions.appendChild(button);
      });

      els.listenFeedback.textContent = "先點喇叭，再選兔兔說的字母。";
    }

    function chooseListen(letter, button) {
      state.stats[letter.upper].attempts += 1;
      if (letter.upper === listenTarget.upper) {
        button.classList.add("correct");
        touch(letter, "correct", true);
        els.listenFeedback.textContent = `聽對了：${letter.upper}`;
        setTimeout(buildListenRound, 780);
      } else {
        lastIncorrectChoice = letter.upper;
        button.classList.add("wrong");
        els.listenFeedback.textContent = "再點喇叭聽一次";
        setTimeout(() => button.classList.remove("wrong"), 520);
      }
      saveState();
    }

    function sayLetter(letter, options = {}) {
      if (!letter) return;
      const includeWord = options.includeWord !== false;

      if (state.soundStyle === "chimeOnly") {
        playCuteChime(letter);
        touch(letter, "heard", false);
        return;
      }

      if (!("speechSynthesis" in window)) {
        els.listenFeedback.textContent = "這個瀏覽器沒有語音，兔兔先用鈴聲。";
        playCuteChime(letter);
        touch(letter, "heard", false);
        return;
      }

      window.speechSynthesis.cancel();
      const text = includeWord
        ? `${letter.upper}. ${letter.upper} is for ${letter.word}.`
        : `Can you find the letter ${letter.upper}?`;
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = "en-US";
      utterance.rate = 0.82;
      utterance.pitch = 1.02;
      utterance.volume = 0.92;
      friendlyVoice = friendlyVoice || pickFriendlyVoice();
      if (friendlyVoice) {
        utterance.voice = friendlyVoice;
      }
      window.speechSynthesis.speak(utterance);
      touch(letter, "heard", false);
    }

    function pickFriendlyVoice() {
      if (!("speechSynthesis" in window)) return null;
      const voices = window.speechSynthesis.getVoices();
      const englishVoices = voices.filter((voice) => /^en[-_]/i.test(voice.lang));
      const preferredNames = [
        /ava/i,
        /samantha/i,
        /zoe/i,
        /karen/i,
        /tessa/i,
        /allison/i,
        /jenny/i,
        /aria/i,
        /victoria/i,
        /moira/i,
        /google us english/i,
        /english.*united states/i
      ];
      const preferredVoice = preferredNames
        .map((pattern) => englishVoices.find((voice) => pattern.test(voice.name)))
        .find(Boolean);
      const premiumVoice = englishVoices.find((voice) => /enhanced|premium|neural|natural/i.test(voice.name));

      return preferredVoice || premiumVoice || englishVoices.find((voice) => voice.localService) || englishVoices[0] || voices[0] || null;
    }

    function playCuteChime(letter) {
      try {
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        if (!AudioContextClass) return;
        cuteAudioContext = cuteAudioContext || new AudioContextClass();
        if (cuteAudioContext.state === "suspended") {
          cuteAudioContext.resume();
        }

        const letterIndex = Math.max(0, LETTERS.findIndex((item) => item.upper === letter.upper));
        const baseFrequencies = [523.25, 659.25, 783.99, 1046.5];
        const root = baseFrequencies[letterIndex % baseFrequencies.length];
        const now = cuteAudioContext.currentTime;
        [1, 1.25, 1.5].forEach((ratio, index) => {
          const oscillator = cuteAudioContext.createOscillator();
          const gain = cuteAudioContext.createGain();
          oscillator.type = "sine";
          oscillator.frequency.setValueAtTime(root * ratio, now + index * 0.075);
          gain.gain.setValueAtTime(0.0001, now + index * 0.075);
          gain.gain.exponentialRampToValueAtTime(0.045, now + index * 0.075 + 0.02);
          gain.gain.exponentialRampToValueAtTime(0.0001, now + index * 0.075 + 0.18);
          oscillator.connect(gain).connect(cuteAudioContext.destination);
          oscillator.start(now + index * 0.075);
          oscillator.stop(now + index * 0.075 + 0.2);
        });
      } catch {
        // Audio APIs can be unavailable in restricted browsers; the page still works without the chime.
      }
    }

    function toggleSoundStyle() {
      state.soundStyle = state.soundStyle === "chimeOnly" ? "softVoice" : "chimeOnly";
      saveState();
      refreshAll();
    }

    function refreshAll() {
      els.starPill.textContent = `星星 ${state.stars}`;
      els.unlockPill.textContent = activeWorld === "alphabet"
        ? `字母 ${unlockedCount()}/26`
        : `實驗 ${completedDiscoveryCount()}/9`;
      els.todayPill.textContent = `今天 ${state.days[TODAY_KEY] || 0}`;
      document.getElementById("toggleSoundStyle").textContent = state.soundStyle === "chimeOnly" ? "聲音：只要鈴聲" : "聲音：自然語音";
      renderFocusLetters();
      renderProgressList(els.miniProgressList, LETTERS.slice(0, unlockedCount()), true);
      renderProgressList(els.fullProgressList, LETTERS, false);
    }

    function renderFocusLetters() {
      els.focusLetters.innerHTML = "";
      focusLetters.forEach((letter) => {
        const item = document.createElement("div");
        item.className = "focus-letter";
        item.textContent = letter.upper;
        item.title = letter.word;
        els.focusLetters.appendChild(item);
      });
    }

    function renderProgressList(target, letters, compact) {
      target.innerHTML = "";
      letters.forEach((letter) => {
        const level = mastery(letter);
        const row = document.createElement("div");
        row.className = "meter-item";

        const label = document.createElement("div");
        label.textContent = letter.upper;

        const track = document.createElement("div");
        track.className = "meter-track";
        const fill = document.createElement("div");
        fill.className = "meter-fill";
        fill.style.width = `${level * 20}%`;
        track.appendChild(fill);

        const score = document.createElement("div");
        score.textContent = `${level}/5`;

        row.append(label, track, score);
        target.appendChild(row);
      });

      if (compact && letters.length === 0) {
        target.textContent = "尚未開始";
      }
    }

    function popStars() {
      const count = 5;
      for (let index = 0; index < count; index += 1) {
        const star = document.createElement("div");
        star.className = "star-pop";
        star.textContent = index % 2 === 0 ? "⭐" : "🌟";
        star.style.left = `${30 + Math.random() * 40}%`;
        star.style.top = `${58 + Math.random() * 20}%`;
        star.style.animationDelay = `${index * 70}ms`;
        els.rewardSky.appendChild(star);
        setTimeout(() => star.remove(), 1200);
      }
    }

    function resetProgress() {
      const confirmed = window.confirm("確定要清空兔兔小小科學院的全部進度嗎？");
      if (!confirmed) return;
      localStorage.removeItem(STORE_KEY);
      location.reload();
    }

    function shuffle(items) {
      const output = [...items];
      for (let index = output.length - 1; index > 0; index -= 1) {
        const swapIndex = Math.floor(Math.random() * (index + 1));
        [output[index], output[swapIndex]] = [output[swapIndex], output[index]];
      }
      return output;
    }
  </script>
</body>
